name: eventcontrol_api
description: EventControl App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^0.13.6
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  image_picker: ^1.0.7
  path_provider: ^2.0.15
  open_file: ^3.2.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
